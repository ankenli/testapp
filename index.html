<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="客戶名單">
<title>客戶名單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f3f1ea;--card:#fffdf8;--ink:#2c2a26;--muted:#8a857c;--line:#e4dfd4;
--shu:#2f7d5b;--shu-bg:#e3f1ea;--bushu:#c2772b;--bushu-bg:#f6e9d7;--bz:#5b6b8a;--bz-bg:#e6eaf1;--none:#b6b0a4;--none-bg:#efece4;
--tlb:#9a5b9c;--done:#2f7d5b;--red:#c0392b;--warn:#e67e22;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",sans-serif;padding:0 0 80px;}

#setupPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px;}
.setup-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 22px;max-width:400px;width:100%;}
.setup-box h2{font-family:"Noto Serif TC",serif;font-size:20px;margin:0 0 8px;}
.setup-box p{color:var(--muted);font-size:14px;margin:0 0 20px;line-height:1.6;}
.setup-box input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--ink);margin-bottom:12px;}
.setup-box button{width:100%;border:none;background:var(--ink);color:#fff;border-radius:10px;padding:13px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;}
.setup-err{color:var(--red);font-size:13px;margin-top:8px;display:none;}

#loadingPage{display:none;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;}
#loadingPage p{color:var(--muted);font-size:15px;}

#listPage{display:none;padding:18px 14px;}
.wrap{max-width:580px;margin:0 auto;}
h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:22px;margin:0 0 2px;}
.sub{color:var(--muted);font-size:13px;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.sync-status{font-size:12px;padding:3px 10px;border-radius:99px;font-weight:500;}
.sync-ok{background:var(--shu-bg);color:var(--shu);}
.sync-ing{background:#fef9e7;color:#b7950b;}
.sync-err{background:#fdf2f2;color:var(--red);}
.tab-bar{display:flex;border-bottom:2px solid var(--line);margin-bottom:16px;}
.tab{flex:1;padding:12px 0;text-align:center;font-size:15px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);}
.regionbar{display:flex;gap:8px;margin-bottom:10px;}
.regionbar select{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.searchbar{position:relative;margin-bottom:12px;}
.searchbar input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 14px 10px 38px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.searchbar input:focus{outline:none;border-color:var(--muted);}
.searchbar::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.filter-group{margin-bottom:8px;}
.filter-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:6px;}
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.fbtn{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:99px;padding:6px 12px;font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:500;}
.fbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.fbtn.f-new{border-color:#9b59b6;color:#9b59b6;}.fbtn.f-new.active{background:#9b59b6;color:#fff;}
.fbtn.f-overdue{border-color:var(--red);color:var(--red);}.fbtn.f-overdue.active{background:var(--red);color:#fff;}
.fbtn.f-soon{border-color:var(--warn);color:var(--warn);}.fbtn.f-soon.active{background:var(--warn);color:#fff;}
.plist{display:flex;flex-direction:column;gap:6px;margin-top:14px;}
.prow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;user-select:none;transition:transform .06s;}
.prow:active{transform:scale(.98);}
.prow.overdue{border-color:var(--red);background:#fff8f8;}
.prow.soon{border-color:var(--warn);background:#fffbf5;}
.prow.isnew{border-color:#9b59b6;background:#fdf8ff;}
.pname{flex:1;font-size:16px;font-weight:500;}
.prg{font-size:12px;color:var(--muted);}
.pbadges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.pbadge{font-size:11px;font-weight:700;border-radius:99px;padding:3px 9px;}
.pb-shu{background:var(--shu-bg);color:var(--shu);}
.pb-pu{background:var(--bushu-bg);color:var(--bushu);}
.pb-bz{background:var(--bz-bg);color:var(--bz);}
.pb-none{background:var(--none-bg);color:var(--none);}
.pb-know{background:#e8f4e8;color:#3a7d3a;}
.pb-unknow{background:#f4e8e8;color:#7d3a3a;}
.pb-tl{background:#f3e8ff;color:var(--tlb);}
.pb-overdue{background:#fde8e8;color:var(--red);}
.pb-soon{background:#fef0e0;color:var(--warn);}
.pb-new{background:#f3e8ff;color:#9b59b6;}
.arrow{color:var(--muted);font-size:18px;}
.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;}
.list-tools{display:flex;justify-content:flex-end;margin-top:12px;}
.reset{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;}
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--ink);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .1s;}
.fab:active{transform:scale(.92);}

/* JOURNAL */
.journal-date-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.journal-date-row input[type=date]{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.journal-date-row button{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;cursor:pointer;color:var(--ink);}
.journal-list{display:flex;flex-direction:column;gap:10px;}
.journal-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;}
.journal-item:active{transform:scale(.98);}
.journal-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.journal-rg{font-size:12px;color:var(--muted);margin-bottom:8px;}
.journal-entries{display:flex;flex-direction:column;gap:6px;}
.journal-entry{font-size:14px;line-height:1.5;padding:7px 10px;background:var(--bg);border-radius:8px;}
.journal-entry-label{font-size:11px;font-weight:700;color:var(--tlb);margin-bottom:2px;}
.journal-empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;}

/* DETAIL */
#detailPage{display:none;padding:0;}
.dheader{display:flex;align-items:center;gap:10px;padding:16px 14px 12px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
.dback{border:none;background:none;font-size:26px;cursor:pointer;padding:0 4px;color:var(--ink);line-height:1;}
.dname{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;flex:1;}
.drg{font-size:12px;color:var(--muted);}
.dedit{border:none;background:none;color:var(--muted);font-size:14px;cursor:pointer;text-decoration:underline;flex-shrink:0;}
.dbody{padding:16px 14px;max-width:580px;margin:0 auto;}
.dsec{margin-bottom:22px;}
.dsec-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
.drow{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.drow label{font-size:14px;min-width:82px;color:var(--ink);}
.drow select{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.next-contact{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
.nc-new{background:#f3e8ff;border:1px solid #d7b8f5;color:#9b59b6;}
.nc-overdue{background:#fde8e8;border:1px solid #f0b8b8;color:var(--red);}
.nc-soon{background:#fef0e0;border:1px solid #f5cfa0;color:var(--warn);}
.nc-ok{background:var(--shu-bg);border:1px solid #b2d8c4;color:var(--shu);}
.note-input-wrap{display:flex;gap:8px;margin-bottom:8px;}
.note-input-wrap textarea{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);resize:none;min-height:72px;}
.note-input-wrap button{border:none;background:var(--ink);color:#fff;border-radius:10px;padding:0 16px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;}
.note-date-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.note-date-row label{font-size:13px;color:var(--muted);white-space:nowrap;}
.note-date-row input[type=date]{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);}
.notes-list{display:flex;flex-direction:column;gap:8px;}
.note-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 13px;}
.note-date{font-size:11px;color:var(--muted);margin-bottom:4px;}
.note-text{font-size:14px;line-height:1.6;}
.note-del{float:right;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;}
.no-notes{color:var(--muted);font-size:14px;text-align:center;padding:16px 0;}

/* 天龍八部 */
.tl-step{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.tl-step-header{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.tl-step-num{width:24px;height:24px;border-radius:50%;background:#f3e8ff;color:var(--tlb);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tl-step-name{flex:1;font-size:15px;font-weight:500;}
.tl-step-count{font-size:12px;color:var(--tlb);font-weight:700;margin-right:4px;}
.tl-add-btn{border:1px solid var(--tlb);background:none;color:var(--tlb);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;}
.tl-entries{padding:0 14px 12px;display:flex;flex-direction:column;gap:6px;}
.tl-entry{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:8px;padding:7px 10px;}
.tl-entry-date{font-size:13px;color:var(--muted);flex:1;}
.tl-entry-del{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;}
.tl-add-row{padding:0 14px 12px;display:flex;gap:8px;align-items:center;}
.tl-add-row input[type=date]{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);}
.tl-add-row button{border:none;background:var(--tlb);color:#fff;border-radius:10px;padding:8px 14px;font-size:14px;font-family:inherit;cursor:pointer;}

/* ADD/EDIT PAGE */
#addPage{display:none;padding:0;}
.aheader{display:flex;align-items:center;gap:10px;padding:16px 14px 12px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
.aback{border:none;background:none;font-size:26px;cursor:pointer;padding:0 4px;color:var(--ink);line-height:1;}
.aheader-title{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;flex:1;}
.abody{padding:16px 14px;max-width:580px;margin:0 auto;}
.arow{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.arow label{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;}
.arow input,.arow select{border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.abtn{width:100%;border:none;background:var(--ink);color:#fff;border-radius:12px;padding:15px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:8px;}
.adel{width:100%;border:1px solid var(--red);background:none;color:var(--red);border-radius:12px;padding:14px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:10px;}
</style></head><body>

<div id="setupPage">
<div class="setup-box">
  <h2>設定 GitHub 同步</h2>
  <p>輸入你的 GitHub Token，讓手機和電腦的資料可以同步。Token 只存在你的裝置上。</p>
  <input id="tokenInput" type="password" placeholder="貼上 ghp_ 開頭的 token">
  <button id="tokenBtn">確認並開始</button>
  <div class="setup-err" id="setupErr"></div>
</div>
</div>

<div id="loadingPage"><p>載入資料中...</p></div>

<div id="listPage">
<div class="wrap">
<h1>客戶名單</h1>
<div class="sub"><span class="sync-status" id="syncStatus"></span></div>
<div class="tab-bar">
  <button class="tab active" data-tab="roster">名單</button>
  <button class="tab" data-tab="journal">聯絡日誌</button>
</div>

<div id="rosterSection">
<div class="regionbar"><select id="region"></select></div>
<div class="searchbar"><input id="searchInput" type="search" placeholder="搜尋名字..."></div>
<div class="filter-group">
  <div class="filter-label">聯絡提醒</div>
  <div class="filters">
    <button class="fbtn f-new" data-f="isnew">未聯絡過</button>
    <button class="fbtn f-overdue" data-f="overdue">🔴 該聯絡了</button>
    <button class="fbtn f-soon" data-f="soon">🟡 快到了</button>
  </div>
</div>
<div class="filter-group" style="margin-top:10px;">
  <div class="filter-label">其他篩選</div>
  <div class="filters">
    <button class="fbtn active" data-f="all">全部</button>
    <button class="fbtn" data-f="empty">未整理</button>
    <button class="fbtn" data-f="shu">熟</button>
    <button class="fbtn" data-f="pu">普通</button>
    <button class="fbtn" data-f="bushu">不熟</button>
    <button class="fbtn" data-f="know">知道保險</button>
    <button class="fbtn" data-f="unknow">不知道保險</button>
    <button class="fbtn" data-f="calling">聯絡中</button>
    <button class="fbtn" data-f="tldone">天龍完成</button>
  </div>
</div>
<div class="plist" id="plist"></div>

</div>

<div id="journalSection" style="display:none;">
  <div class="journal-date-row">
    <input type="date" id="journalDate">
    <button id="journalPrev">‹</button>
    <button id="journalNext">›</button>
  </div>
  <div class="journal-list" id="journalList"></div>
</div>

</div>
</div>

<div id="detailPage">
<div class="dheader">
  <button class="dback" id="backBtn">‹</button>
  <div style="flex:1;min-width:0;"><div class="dname" id="dname"></div><div class="drg" id="drg"></div></div>
  <button class="dedit" id="editBtn">編輯</button>
</div>
<div class="dbody">
<div id="nextContactBanner"></div>
<div class="dsec">
<div class="dsec-title">分類</div>
<div class="drow"><label>熟不熟</label>
<select id="dShu"><option value="0">未分類</option><option value="1">熟</option><option value="2">普通</option><option value="3">不熟</option></select></div>
<div class="drow"><label>知道保險</label>
<select id="dKnow"><option value="0">未設定</option><option value="1">知道</option><option value="2">不知道</option><option value="3">不清楚</option></select></div>
<div class="drow"><label>提醒間隔</label><select id="dRemind"></select></div>
</div>

<div class="dsec">
<div class="dsec-title">天龍八部</div>
<div id="tlSteps"></div>
</div>

<div class="dsec">
<div class="dsec-title">聯絡紀錄</div>
<div class="note-input-wrap">
<textarea id="noteInput" placeholder="輸入這次聯絡的狀況..."></textarea>
<button id="noteAddBtn">記錄</button>
</div>
<div class="note-date-row"><label>聯絡日期</label><input type="date" id="noteDate"></div>
<div class="notes-list" id="notesList"></div>
</div>
</div>
</div>

<div id="addPage">
<div class="aheader">
  <button class="aback" id="addBack">‹</button>
  <div class="aheader-title" id="addPageTitle">新增聯絡人</div>
</div>
<div class="abody">
  <div class="arow"><label>姓名</label><input id="aName" type="text" placeholder="輸入姓名"></div>
  <div class="arow"><label>地區</label><select id="aRegion"></select></div>
  <div class="arow"><label>熟不熟</label>
  <select id="aShu"><option value="0">未分類</option><option value="1">熟</option><option value="2">普通</option><option value="3">不熟</option></select></div>
  <div class="arow"><label>知道保險</label>
  <select id="aKnow"><option value="0">未設定</option><option value="1">知道</option><option value="2">不知道</option><option value="3">不清楚</option></select></div>
  <div class="arow"><label>提醒間隔</label><select id="aRemind"></select></div>
  <button class="abtn" id="aSaveBtn">儲存</button>
  <button class="adel" id="aDelBtn" style="display:none;">刪除這個人</button>
</div>
</div>

<button class="fab" id="fabBtn">＋</button>

<script>
const GITHUB_USER='ankenli',GITHUB_REPO='testapp',DATA_FILE='roster-data.json';
const API_URL='https://api.github.com/repos/'+GITHUB_USER+'/'+GITHUB_REPO+'/contents/'+DATA_FILE;
const DEFAULT_REMIND=30,SOON_DAYS=7;
const TL_STEPS=['夢想說100次','好做','好賣','好賺','出國','安心','介紹獎金','期限'];
const SEED=[];
const REGIONS=["台南","高雄","嘉義","台中","台北","新竹","屏東","桃園","雲林","花蓮","台東","未知"];
let roster=[],vFilter='all',regionFilter='全部',currentId=null,editingId=null,fileSha=null,searchQuery='';
let ghToken=localStorage.getItem('gh_token')||'';
let saveTimer=null;

const PAGES=['setupPage','loadingPage','listPage','detailPage','addPage'];
function show(id){
  PAGES.forEach(p=>{const el=document.getElementById(p);if(el)el.style.display=p===id?(p==='loadingPage'?'flex':'block'):'none';});
  const fab=document.getElementById('fabBtn');if(fab)fab.style.display=(id==='listPage')?'flex':'none';
}

function seed(){return SEED.map((d,i)=>({id:'p'+i,name:d.n,region:d.r,shu:0,know:0,remind:DEFAULT_REMIND,notes:[],tlLog:[]}));}

function migrate(p){
  if(!p.notes)p.notes=[];
  if(!p.remind)p.remind=DEFAULT_REMIND;
  if(!p.tlLog)p.tlLog=[];
  return p;
}

function buildRemindSelect(sel,val){
  sel.innerHTML='';
  for(let i=1;i<=30;i++){const o=document.createElement('option');o.value=i;o.textContent=i+' 天';sel.appendChild(o);}
  sel.value=val||DEFAULT_REMIND;
}
function buildRegionSelect(sel,val){
  sel.innerHTML='';
  REGIONS.forEach(rg=>{const o=document.createElement('option');o.value=rg;o.textContent=rg;sel.appendChild(o);});
  const other=document.createElement('option');other.value='未知';other.textContent='其他';sel.appendChild(other);
  if(val)sel.value=val;
}

function today(){const d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
function parseLocalDate(str){const p=str.replace(/\//g,'-').split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}

function lastContactDate(p){
  if(!p.notes||!p.notes.length)return null;
  const dates=p.notes.map(n=>parseLocalDate(n.date)).filter(d=>!isNaN(d));
  return dates.length?new Date(Math.max(...dates)):null;
}
function contactStatus(p){
  const remind=p.remind||DEFAULT_REMIND;
  const last=lastContactDate(p);
  if(!last)return 'isnew';
  const diff=Math.floor((new Date()-last)/86400000);
  if(diff>=remind)return 'overdue';
  if(diff>=remind-SOON_DAYS)return 'soon';
  return 'ok';
}
function daysUntilNext(p){
  const remind=p.remind||DEFAULT_REMIND;
  const last=lastContactDate(p);
  if(!last)return null;
  return remind-Math.floor((new Date()-last)/86400000);
}
function tlUnique(p){
  if(!p.tlLog||!p.tlLog.length)return 0;
  return new Set(p.tlLog.map(e=>e.step)).size;
}

async function ghGet(){
  const res=await fetch(API_URL,{headers:{Authorization:'token '+ghToken,Accept:'application/vnd.github.v3+json'}});
  if(res.status===404)return null;if(!res.ok)throw new Error('讀取失敗');
  const data=await res.json();fileSha=data.sha;
  return JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
}
async function ghPut(r){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(r))));
  const body={message:'update',content};if(fileSha)body.sha=fileSha;
  const res=await fetch(API_URL,{method:'PUT',headers:{Authorization:'token '+ghToken,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok)throw new Error('儲存失敗');
  const d=await res.json();if(d.content)fileSha=d.content.sha;
}
function setSyncStatus(s,m){const el=document.getElementById('syncStatus');if(!el)return;el.textContent=m;el.className='sync-status '+(s==='ok'?'sync-ok':s==='ing'?'sync-ing':'sync-err');}
function scheduleSave(){clearTimeout(saveTimer);setSyncStatus('ing','同步中...');saveTimer=setTimeout(async()=>{try{await ghPut(roster);setSyncStatus('ok','已同步');}catch(e){setSyncStatus('err','同步失敗');}},2000);}

document.getElementById('tokenBtn').onclick=async()=>{
  const t=document.getElementById('tokenInput').value.trim();
  const err=document.getElementById('setupErr');
  if(!t.startsWith('ghp_')){err.textContent='請輸入 ghp_ 開頭的 token';err.style.display='block';return;}
  err.style.display='none';ghToken=t;localStorage.setItem('gh_token',t);await startApp();
};

async function startApp(){
  show('loadingPage');
  try{
    const remote=await ghGet();
    if(remote){roster=remote.map(migrate);}
    else{roster=seed();await ghPut(roster);}
    initRegion();renderList();
    const nd=document.getElementById('journalDate');if(nd&&!nd.value)nd.value=todayISO();
    show('listPage');setSyncStatus('ok','已同步');
  }catch(e){
    show('setupPage');
    document.getElementById('setupErr').textContent='Token 有誤或網路問題';
    document.getElementById('setupErr').style.display='block';
  }
}

function initRegion(){
  const sel=document.getElementById('region');const prev=regionFilter;sel.innerHTML='';
  const all=document.createElement('option');all.value='全部';all.textContent='全部地區 ('+roster.length+')';sel.appendChild(all);
  REGIONS.forEach(rg=>{const n=roster.filter(p=>p.region===rg).length;const o=document.createElement('option');o.value=rg;o.textContent=rg+' ('+n+')';sel.appendChild(o);});
  sel.value=prev;regionFilter=sel.value||'全部';
  sel.onchange=()=>{regionFilter=sel.value;renderList();};
}

function scope(){return roster.filter(p=>regionFilter==='全部'||p.region===regionFilter);}
function matchFilter(p){
  const cs=contactStatus(p);
  switch(vFilter){
    case'isnew':return cs==='isnew';case'overdue':return cs==='overdue';case'soon':return cs==='soon';
    case'empty':return p.shu===0&&p.know===0;
    case'shu':return p.shu===1;case'pu':return p.shu===2;case'bushu':return p.shu===3;
    case'know':return p.know===1;case'unknow':return p.know===2;
    case'calling':return p.notes&&p.notes.length>0;
    case'tldone':return tlUnique(p)>=TL_STEPS.length;
    default:return true;
  }
}

function shuBadge(p){const a=[['pb-none','未分類'],['pb-shu','熟'],['pb-pu','普通'],['pb-bz','不熟']];const[c,t]=a[p.shu];return '<span class="pbadge '+c+'">'+t+'</span>';}
function knowBadge(p){if(p.know===1)return '<span class="pbadge pb-know">知道保險</span>';if(p.know===2)return '<span class="pbadge pb-unknow">不知道</span>';if(p.know===3)return '<span class="pbadge pb-none">不清楚</span>';return '';}
function contactBadge(p){
  const cs=contactStatus(p);
  if(cs==='isnew')return '<span class="pbadge pb-new">未聯絡過</span>';
  if(cs==='overdue')return '<span class="pbadge pb-overdue">🔴 該聯絡了</span>';
  if(cs==='soon')return '<span class="pbadge pb-soon">🟡 '+daysUntilNext(p)+'天後</span>';
  return '';
}
function tlBadge(p){
  const u=tlUnique(p);
  if(u===0)return '';
  if(u>=TL_STEPS.length)return '<span class="pbadge pb-tl">天龍完成</span>';
  return '<span class="pbadge pb-tl">天龍 '+u+'/8</span>';
}

function renderList(){
  const list=document.getElementById('plist');if(!list)return;list.innerHTML='';
  let items=scope().filter(matchFilter);
  if(searchQuery)items=items.filter(p=>p.name.toLowerCase().includes(searchQuery));
  if(!items.length){list.innerHTML='<div class="empty">這個分類目前沒有人</div>';return;}
  items.forEach(p=>{
    const cs=contactStatus(p);
    const row=document.createElement('div');
    row.className='prow'+(cs==='overdue'?' overdue':cs==='soon'?' soon':cs==='isnew'?' isnew':'');
    const rg=regionFilter==='全部'?'<span class="prg">'+p.region+'</span>':'';
    row.innerHTML='<span class="pname"></span>'+rg+'<div class="pbadges">'+shuBadge(p)+knowBadge(p)+contactBadge(p)+tlBadge(p)+'</div><span class="arrow">›</span>';
    row.querySelector('.pname').textContent=p.name;
    row.onclick=()=>openDetail(p.id);
    list.appendChild(row);
  });
}

document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value.trim().toLowerCase();renderList();});

function renderNextContactBanner(p){
  const banner=document.getElementById('nextContactBanner');if(!banner)return;
  const cs=contactStatus(p);let cls,msg;
  if(cs==='isnew'){cls='next-contact nc-new';msg='🆕 還沒聯絡過，現在可以開始！';}
  else if(cs==='overdue'){cls='next-contact nc-overdue';msg='🔴 已超過提醒間隔，現在該聯絡了！';}
  else if(cs==='soon'){cls='next-contact nc-soon';msg='🟡 還有 '+daysUntilNext(p)+' 天到下次聯絡時間';}
  else{cls='next-contact nc-ok';msg='✅ 下次聯絡還有 '+daysUntilNext(p)+' 天';}
  banner.innerHTML='<div class="'+cls+'">'+msg+'</div>';
}

function renderTLSteps(p){
  const container=document.getElementById('tlSteps');if(!container)return;
  container.innerHTML='';
  TL_STEPS.forEach((name,si)=>{
    const entries=(p.tlLog||[]).filter(e=>e.step===si);
    const box=document.createElement('div');box.className='tl-step';
    box.innerHTML=
      '<div class="tl-step-header">'+
        '<div class="tl-step-num">'+(si+1)+'</div>'+
        '<div class="tl-step-name">'+name+'</div>'+
        (entries.length?'<span class="tl-step-count">'+entries.length+'次</span>':'')+
        '<button class="tl-add-btn" data-si="'+si+'">＋ 新增</button>'+
      '</div>'+
      (entries.length?'<div class="tl-entries" id="tlE'+si+'"></div>':'')+
      '<div class="tl-add-row" id="tlR'+si+'" style="display:none;">'+
        '<input type="date" id="tlD'+si+'" value="'+todayISO()+'">'+
        '<button data-confirm="'+si+'">確認</button>'+
      '</div>';
    container.appendChild(box);

    if(entries.length){
      const eContainer=box.querySelector('#tlE'+si);
      entries.forEach((e,ei)=>{
        const actualIdx=(p.tlLog||[]).findIndex((x,i)=>x.step===si&&(p.tlLog||[]).filter((y,j)=>y.step===si&&j<i).length===ei);
        const row=document.createElement('div');row.className='tl-entry';
        row.innerHTML='<span class="tl-entry-date">'+e.date+'</span><button class="tl-entry-del" data-idx="'+actualIdx+'">刪除</button>';
        eContainer.appendChild(row);
      });
      eContainer.querySelectorAll('.tl-entry-del').forEach(btn=>{
        btn.onclick=()=>{
          const idx=parseInt(btn.dataset.idx);
          p.tlLog.splice(idx,1);scheduleSave();renderTLSteps(p);renderList();
        };
      });
    }

    box.querySelector('.tl-add-btn').onclick=()=>{
      const row=document.getElementById('tlR'+si);
      row.style.display=row.style.display==='none'?'flex':'none';
    };
    box.querySelector('[data-confirm]').onclick=()=>{
      const dateVal=document.getElementById('tlD'+si).value;
      const dateStr=dateVal?dateVal.replace(/-/g,'/'):today();
      if(!p.tlLog)p.tlLog=[];
      p.tlLog.push({step:si,date:dateStr});
      scheduleSave();renderTLSteps(p);renderList();
    };
  });
}

function openDetail(id){
  currentId=id;const p=roster.find(x=>x.id===id);if(!p)return;
  document.getElementById('dname').textContent=p.name;
  document.getElementById('drg').textContent=p.region;
  document.getElementById('dShu').value=p.shu;
  document.getElementById('dKnow').value=p.know;
  buildRemindSelect(document.getElementById('dRemind'),p.remind||DEFAULT_REMIND);
  renderNextContactBanner(p);
  renderTLSteps(p);
  renderNotes(p);
  const nd=document.getElementById('noteDate');if(nd)nd.value=todayISO();
  show('detailPage');window.scrollTo(0,0);
}

document.getElementById('backBtn').onclick=()=>{show('listPage');renderList();};
document.getElementById('editBtn').onclick=()=>openAddPage(currentId);
document.getElementById('dShu').onchange=()=>{const p=roster.find(x=>x.id===currentId);if(p){p.shu=parseInt(document.getElementById('dShu').value);scheduleSave();}};
document.getElementById('dKnow').onchange=()=>{const p=roster.find(x=>x.id===currentId);if(p){p.know=parseInt(document.getElementById('dKnow').value);scheduleSave();}};
document.getElementById('dRemind').onchange=()=>{const p=roster.find(x=>x.id===currentId);if(p){p.remind=parseInt(document.getElementById('dRemind').value);renderNextContactBanner(p);scheduleSave();}};

function renderNotes(p){
  const list=document.getElementById('notesList');if(!list)return;list.innerHTML='';
  if(!p.notes||!p.notes.length){list.innerHTML='<div class="no-notes">還沒有聯絡紀錄</div>';return;}
  [...p.notes].reverse().forEach((n,ri)=>{
    const i=p.notes.length-1-ri;
    const item=document.createElement('div');item.className='note-item';
    item.innerHTML='<button class="note-del">刪除</button><div class="note-date">'+n.date+'</div><div class="note-text"></div>';
    item.querySelector('.note-text').textContent=n.text;
    item.querySelector('.note-del').onclick=()=>{const p2=roster.find(x=>x.id===currentId);if(!p2)return;p2.notes.splice(i,1);scheduleSave();renderNotes(p2);renderNextContactBanner(p2);};
    list.appendChild(item);
  });
}

document.getElementById('noteAddBtn').onclick=()=>{
  const inp=document.getElementById('noteInput');const v=inp.value.trim();if(!v)return;
  const p=roster.find(x=>x.id===currentId);if(!p)return;
  if(!p.notes)p.notes=[];
  const dateEl=document.getElementById('noteDate');
  const d=dateEl&&dateEl.value?dateEl.value.replace(/-/g,'/'):today();
  p.notes.push({date:d,text:v});
  inp.value='';scheduleSave();renderNotes(p);renderNextContactBanner(p);
};

document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');vFilter=btn.dataset.f;renderList();
  });
});

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const t=tab.dataset.tab;
    document.getElementById('rosterSection').style.display=t==='roster'?'block':'none';
    document.getElementById('journalSection').style.display=t==='journal'?'block':'none';
    if(t==='journal')renderJournal();
  });
});

function renderJournal(){
  const dateEl=document.getElementById('journalDate');
  const list=document.getElementById('journalList');
  if(!dateEl||!dateEl.value){if(list)list.innerHTML='<div class="journal-empty">請選擇日期</div>';return;}
  const target=dateEl.value.replace(/-/g,'/');
  const results=[];
  roster.forEach(p=>{
    const noteMatches=(p.notes||[]).filter(n=>n.date===target);
    const tlMatches=(p.tlLog||[]).filter(e=>e.date===target);
    if(noteMatches.length||tlMatches.length) results.push({p,noteMatches,tlMatches});
  });
  list.innerHTML='';
  if(!results.length){list.innerHTML='<div class="journal-empty">這天沒有聯絡紀錄</div>';return;}
  results.forEach(({p,noteMatches,tlMatches})=>{
    const item=document.createElement('div');item.className='journal-item';
    let entries='';
    noteMatches.forEach(n=>{entries+='<div class="journal-entry"><div class="journal-entry-label">聯絡紀錄</div></div>';});
    tlMatches.forEach(e=>{entries+='<div class="journal-entry"><div class="journal-entry-label">天龍：'+(TL_STEPS[e.step]||'')+'</div></div>';});
    item.innerHTML='<div class="journal-name"></div><div class="journal-rg">'+p.region+'</div><div class="journal-entries">'+entries+'</div>';
    item.querySelector('.journal-name').textContent=p.name;
    const noteEls=item.querySelectorAll('.journal-entry');
    noteMatches.forEach((n,i)=>{const el=noteEls[i].querySelector('.journal-entry-label');el.after(document.createTextNode(n.text));});
    item.onclick=()=>openDetail(p.id);
    list.appendChild(item);
  });
}

document.getElementById('journalDate').addEventListener('change',renderJournal);
document.getElementById('journalPrev').onclick=()=>{
  const el=document.getElementById('journalDate');
  if(!el.value){el.value=todayISO();renderJournal();return;}
  const d=new Date(el.value);d.setDate(d.getDate()-1);el.value=d.toISOString().slice(0,10);renderJournal();
};
document.getElementById('journalNext').onclick=()=>{
  const el=document.getElementById('journalDate');
  if(!el.value){el.value=todayISO();renderJournal();return;}
  const d=new Date(el.value);d.setDate(d.getDate()+1);el.value=d.toISOString().slice(0,10);renderJournal();
};

function openAddPage(id){
  editingId=id||null;
  const p=id?roster.find(x=>x.id===id):null;
  document.getElementById('addPageTitle').textContent=p?'編輯聯絡人':'新增聯絡人';
  document.getElementById('aName').value=p?p.name:'';
  buildRegionSelect(document.getElementById('aRegion'),p?p.region:(regionFilter!=='全部'?regionFilter:REGIONS[0]));
  document.getElementById('aShu').value=p?p.shu:0;
  document.getElementById('aKnow').value=p?p.know:0;
  buildRemindSelect(document.getElementById('aRemind'),p?p.remind:DEFAULT_REMIND);
  document.getElementById('aDelBtn').style.display=p?'block':'none';
  show('addPage');window.scrollTo(0,0);
}

document.getElementById('fabBtn').onclick=()=>openAddPage(null);
document.getElementById('addBack').onclick=()=>{if(editingId){show('detailPage');}else{show('listPage');renderList();}};

document.getElementById('aSaveBtn').onclick=()=>{
  const name=document.getElementById('aName').value.trim();if(!name){alert('請輸入姓名');return;}
  const region=document.getElementById('aRegion').value;
  const shu=parseInt(document.getElementById('aShu').value);
  const know=parseInt(document.getElementById('aKnow').value);
  const remind=parseInt(document.getElementById('aRemind').value);
  if(editingId){
    const p=roster.find(x=>x.id===editingId);
    if(p){p.name=name;p.region=region;p.shu=shu;p.know=know;p.remind=remind;}
    scheduleSave();initRegion();
    document.getElementById('dname').textContent=name;
    document.getElementById('drg').textContent=region;
    show('detailPage');
  }else{
    roster.unshift({id:'p_'+Date.now(),name,region,shu,know,remind,notes:[],tlLog:[]});
    scheduleSave();initRegion();renderList();show('listPage');
  }
};

document.getElementById('aDelBtn').onclick=()=>{
  if(!editingId)return;
  const p=roster.find(x=>x.id===editingId);if(!p)return;
  if(confirm('確定要刪除「'+p.name+'」嗎？')){
    roster=roster.filter(x=>x.id!==editingId);
    scheduleSave();initRegion();renderList();show('listPage');
  }
};



if(ghToken){startApp();}else{show('setupPage');}
</script></body></html>
